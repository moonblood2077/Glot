<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Glot 설정</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { width:300px; background:#1a1a1b; color:#d7dadc; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; }
    header { padding:16px; border-bottom:1px solid #343536; display:flex; align-items:center; gap:8px; }
    header h1 { font-size:18px; font-weight:700; color:#ff4500; }
    header span { font-size:11px; color:#818384; }
    main { padding:16px; display:flex; flex-direction:column; gap:16px; }
    .field label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#818384; margin-bottom:6px; }
    .field select { width:100%; background:#272729; border:1px solid #343536; border-radius:4px; color:#d7dadc; font-size:13px; padding:8px 10px; outline:none; }
    .field select:focus { border-color:#ff4500; }
    button#save { width:100%; background:#ff4500; border:none; border-radius:4px; color:#fff; font-size:14px; font-weight:700; padding:10px; cursor:pointer; transition:background .15s; }
    button#save:hover { background:#e03d00; }
    #status { text-align:center; font-size:12px; min-height:16px; }
    footer { padding:12px 16px; border-top:1px solid #343536; font-size:11px; color:#818384; text-align:center; }
  </style>
</head>
<body>
  <header><h1>Glot</h1><span>Reddit 번역 익스텐션</span></header>
  <main>
    <div class="field">
      <label>번역 언어</label>
      <select id="targetLang">
        <option value="ko">한국어</option>
        <option value="en">영어</option>
        <option value="ja">일본어</option>
        <option value="zh">중국어</option>
      </select>
    </div>
    <button id="save">저장</button>
    <div id="status"></div>
  </main>
  <footer>게시글·댓글 클릭으로 번역</footer>
  <script src="popup.js"></script>
</body>
</html>
